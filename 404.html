<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <meta name="description" content="Page not found. Return to Nkosi Sites">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .error-content {
            padding: 2rem;
        }
        .error-content h1 {
            font-size: 5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .error-content p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <p>Page Not Found</p>
            <p style="font-size: 1rem; opacity: 0.8; margin-bottom: 2rem;">The page you're looking for doesn't exist or has been moved.</p>
            <a href="index.html" class="btn btn-secondary" style="font-size: 1.1rem;">Return to Home</a>
        </div>
    </div>
</body>
</html>
